<div class="text-center">
  <h1>Available Courses</h1>

  <div class="row">
    <div class="col-4" *ngFor="let course of courses">
      <div class="card clickable" (click)="onCourseClick(course.id)">
        <div class="card-header">
          <h6 class="text-center">{{ course.title | titlecase }}</h6>
        </div>
      </div>
    </div>
  </div>
</div>
