<div class="row">
  <div class="col-8 offset-2">
    <div class="card">
      <div class="card-header">
        <h5 class="text-center">Registration Form</h5>
      </div>
      <div class="card-body">
        <!-- form -->
        <form [formGroup]="registerForm" (submit)="onSubmit()">
          <!-- username -->
          <div class="form-floating mb-3">
            <input
              type="text"
              class="form-control"
              name="email"
              id="email"
              placeholder=""
              formControlName="email"
            />
            <label for="email">Email</label>
            <!-- Email Error Messages -->
            <div *ngIf="email.invalid && email.touched">
              <div *ngIf="email.hasError('required')">
                <small style="color: red">Email is mandatory field</small>
              </div>
              <div *ngIf="email.hasError('email')">
                <small style="color: red"
                  >Should be in proper email format</small
                >
              </div>
            </div>
          </div>

          <!-- password -->
          <div class="form-floating mb-3">
            <input
              type="password"
              class="form-control"
              name="password"
              id="password"
              placeholder=""
              formControlName="password"
            />
            <label for="password">Password</label>
            <!-- Password Error Messages -->
            <div *ngIf="password.invalid && password.touched">
              <div *ngIf="password.hasError('required')">
                <small style="color: red">Password is mandatory field</small>
              </div>
              <div *ngIf="password.hasError('minlength')">
                <small style="color: red"
                  >Should have at least six characters</small
                >
              </div>
              <div *ngIf="password.hasError('specialSymbol')">
                <small style="color: red">Must have special symbol (!)</small>
              </div>
            </div>
          </div>

          <!-- buttons - Register and Reset -->
          <div class="row">
            <div class="col">
              <div class="d-grid">
                <button
                  type="submit"
                  class="btn btn-success"
                  [disabled]="!registerForm.valid"
                >
                  Register
                </button>
              </div>
            </div>
            <div class="col">
              <div class="d-grid">
                <button
                  class="btn btn-secondary"
                  (click)="registerForm.reset()"
                >
                  Reset
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
