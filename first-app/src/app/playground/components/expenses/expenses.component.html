<h2 class="text-center">My Expenses</h2>

<div class="row">
  <div class="col-4" *ngFor="let expense of expenseCollection">
    <div class="card">
      <div class="card-header">{{ expense.title | uppercase }}</div>
      <div class="card-body">
        <p>Amount : {{ expense.amount | currency: "INR" }}</p>
        <p>Created At : {{ expense.createdAt | date: "MMM dd, yyyy" }}</p>
      </div>
    </div>
  </div>
</div>
